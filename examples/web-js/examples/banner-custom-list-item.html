<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>web-js — banner custom item</title>
  <link rel="stylesheet" href="../styles.css">
</head>

<body>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: white;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .page { padding: 40px; }

    .custom-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 20px;
      background: linear-gradient(90deg, #4f46e5, #7c3aed);
      color: white;
      font-size: 14px;
    }

    .custom-banner button {
      background: white;
      color: #4f46e5;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>

  <!-- The `custom` layout defers entirely to your factory — the theme is not applied. -->
  <courier-banner id="my-banner" layout="custom"></courier-banner>

  <div class="page">
    <button id="show-banner-button">Show custom banner</button>
  </div>

  <script type="module">
    import { Courier, CourierBannerDatastore } from '@trycourier/courier-ui-banner';

    Courier.shared.signIn({
      userId: import.meta.env.VITE_USER_ID,
      jwt: import.meta.env.VITE_JWT,
    });

    const banner = document.getElementById("my-banner");

    // Render an entirely custom element for each banner. `dismiss` removes the message.
    banner.setBannerItem(({ message, dismiss }) => {
      const el = document.createElement("div");
      el.className = "custom-banner";

      const text = document.createElement("span");
      text.textContent = message.title ?? "";
      el.appendChild(text);

      const button = document.createElement("button");
      button.textContent = "Got it";
      button.addEventListener("click", dismiss);
      el.appendChild(button);

      return el;
    });

    document.getElementById("show-banner-button").addEventListener("click", () => {
      CourierBannerDatastore.shared.addMessage({
        messageId: "custom-1",
        title: "🎨 This banner is fully custom — styled by you, not the theme.",
      });
    });
  </script>

</body>

</html>
