<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preferences — Styled</title>
  <link rel="stylesheet" href="../styles.css">
</head>

<body>
  <style>
    @font-face {
      font-family: 'Poppins';
      src: url('../Poppins-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    body {
      margin: 0;
      background: #F4F1FB;
      min-height: 100vh;
    }

    .preferences-wrapper {
      margin: 0 auto;
      padding: 40px 16px;
    }
  </style>

  <div class="preferences-wrapper">
    <courier-preferences id="prefs"></courier-preferences>
  </div>

  <script type="module">
    import { Courier } from '@trycourier/courier-ui-preferences';

    // Authenticate the user
    Courier.shared.signIn({
      userId: import.meta.env.VITE_USER_ID,
      jwt: import.meta.env.VITE_JWT,
    });

    const prefs = document.getElementById('prefs');

    const FONT = 'Poppins';
    const ACCENT = '#8B5CF6';

    // A fully styled light theme demonstrating fonts, corner radius,
    // borders, dividers, and colors across every preferences element.
    const lightTheme = {
      // Accent used for the active toggle track (and as a fallback).
      primaryColor: ACCENT,

      // Root container shell.
      container: {
        font: {
          family: FONT,
          color: '#1E1B2E',
        },
      },

      // Loading / error status text.
      loading: { font: { family: FONT, size: '14px', weight: '400', color: '#6B6580' } },
      error: { font: { family: FONT, size: '14px', weight: '400', color: '#DC2626' } },

      // Section heading.
      section: {
        title: { family: FONT, size: '18px', weight: '600', color: '#1E1B2E' },
      },

      // Topic card.
      topic: {
        title: { family: FONT, size: '16px', weight: '500', color: '#1E1B2E' },
        statusLabel: { family: FONT, size: '13px', weight: '400', color: '#8A82A3' },
        toggle: {
          trackColor: '#D9D3EC',
          trackActiveColor: ACCENT,
          thumbColor: '#FFFFFF',
          borderRadius: '12px',
        },
      },

      // Digest schedule options (radio rows).
      digest: {
        font: { family: FONT, size: '14px', weight: '400', color: '#6B6580' },
        selectedFont: { family: FONT, size: '14px', weight: '600', color: '#1E1B2E' },
        iconColor: ACCENT,
        radio: {
          ringColor: '#D9D3EC',
          checkedColor: ACCENT,
        },
      },

      // Channel routing chips (checkbox rows).
      channelChip: {
        font: { family: FONT, size: '14px', weight: '400', color: '#6B6580' },
        selectedFont: { family: FONT, size: '14px', weight: '600', color: '#1E1B2E' },
        divider: '1px solid #ECE8F7',
        checkbox: {
          checkedColor: ACCENT,
        },
      },
    };

    // A matching dark theme.
    const darkTheme = {
      primaryColor: ACCENT,
      container: {
        font: {
          family: FONT,
          color: '#F5F3FB',
        },
      },
      loading: { font: { family: FONT, size: '14px', weight: '400', color: '#A39FB8' } },
      error: { font: { family: FONT, size: '14px', weight: '400', color: '#F87171' } },
      section: {
        title: { family: FONT, size: '18px', weight: '600', color: '#F5F3FB' },
      },
      topic: {
        title: { family: FONT, size: '16px', weight: '500', color: '#F5F3FB' },
        statusLabel: { family: FONT, size: '13px', weight: '400', color: '#A39FB8' },
        toggle: {
          trackColor: '#3A3552',
          trackActiveColor: ACCENT,
          thumbColor: '#FFFFFF',
          borderRadius: '12px',
        },
      },
      digest: {
        font: { family: FONT, size: '14px', weight: '400', color: '#A39FB8' },
        selectedFont: { family: FONT, size: '14px', weight: '600', color: '#F5F3FB' },
        iconColor: '#B79CFF',
        radio: {
          ringColor: '#3A3552',
          checkedColor: '#B79CFF',
        },
      },
      channelChip: {
        font: { family: FONT, size: '14px', weight: '400', color: '#A39FB8' },
        selectedFont: { family: FONT, size: '14px', weight: '600', color: '#F5F3FB' },
        divider: '1px solid #2E2A40',
        checkbox: {
          checkedColor: '#B79CFF',
        },
      },
    };

    prefs.setLightTheme(lightTheme);
    prefs.setDarkTheme(darkTheme);

    // Force light, dark, or system. Defaults to following the OS.
    prefs.setMode('light');
  </script>

</body>

</html>
