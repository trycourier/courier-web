<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>web-js — banner basic</title>
  <link rel="stylesheet" href="../styles.css">
</head>

<body>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: white;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .page {
      padding: 40px;
    }
  </style>

  <!-- The `banner` layout renders inline at the element's location. Placed at the top of the page. -->
  <courier-banner id="my-banner"></courier-banner>

  <div class="page">
    <button id="show-banner-button">Show basic banner</button>
  </div>

  <script type="module">
    import { Courier, CourierBannerDatastore } from '@trycourier/courier-ui-banner';

    // Authenticate the user with Courier
    Courier.shared.signIn({
      userId: import.meta.env.VITE_USER_ID,
      jwt: import.meta.env.VITE_JWT,
    });

    const button = document.getElementById("show-banner-button");

    button.addEventListener("click", () => {
      CourierBannerDatastore.shared.addMessage({
        messageId: "banner-1",
        title: "🚀 New: Banners are here",
        body: "Drop <courier-banner> anywhere and post a message to render it inline.",
        actions: [
          { content: "Learn more" },
          { content: "Dismiss" }
        ]
      });
    });
  </script>

</body>

</html>
